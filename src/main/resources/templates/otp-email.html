<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .header {
            text-align: center;
            padding-bottom: 20px;
        }

        .otp-code {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            color: #2c3e50;
            letter-spacing: 5px;
            margin: 20px 0;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }

        .footer {
            font-size: 12px;
            color: #777;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Verify Your Account</h2>
    </div>
    <p>Hello <span th:text="${name}">User</span>,</p>
    <p>Thank you for choosing our service. Use the following OTP to complete your verification process. This OTP is
        valid for 10 minutes.</p>
    <div class="otp-code" th:text="${otp}">123456</div>
    <p>If you did not request this code, please ignore this email.</p>
    <div class="footer">
        &copy; 2026 SpringRef. All rights reserved.
    </div>
</div>
</body>
</html>
