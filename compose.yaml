services:
  postgres:
    image: 'postgres:latest'
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: 'spring-ref'
      POSTGRES_USER: 'meet'
      POSTGRES_PASSWORD: '1234'
    volumes:
      - postgres-data:/var/lib/postgresql
  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'

volumes:
  postgres-data: